<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Complaint System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Complaint Portal</a>
        <div>
            <a class="btn btn-light" href="/admin">Admin Dashboard</a>
        </div>
    </div>
</nav>
<div class="container">
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card shadow-sm">
                <div class="card-body">

                    <h4 class="card-title mb-3">Submit a complaint</h4>
                    <form id="complaintForm" th:action="@{/submit}" th:object="${complaint}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input class="form-control" type="text" th:field="*{customerName}" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input class="form-control" type="email" th:field="*{customerEmail}" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Subject</label>
                            <input class="form-control" type="text" th:field="*{subject}" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Department</label>
                            <select class="form-select" th:field="*{department}" required>
                                <option th:each="dept : ${departments}" th:value="${dept}" th:text="${dept.displayName}"></option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Priority</label>
                            <select class="form-select" th:field="*{priority}" required>
                                <option value="Low">Low</option>
                                <option value="Normal" selected>Normal</option>
                                <option value="High">High</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" th:field="*{description}" rows="5" required></textarea>
                        </div>
                        <button class="btn btn-primary" type="submit">Submit Complaint</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="/js/script.js"></script>
</body>
</html>
